name: Refresh OAuth2 Token

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install requests cryptography

      - name: Refresh OAuth2 token
        run: |
          python - <<'PY'
          import os

          from tweet_bot import get_oauth2_refresh_token, refresh_oauth2_access_token

          missing = [
              name
              for name in (
                  "OAUTH2_CLIENT_ID",
                  "OAUTH2_CLIENT_SECRET",
                  "OAUTH2_REFRESH_TOKEN_KEY",
              )
              if not os.getenv(name)
          ]
          if missing:
              raise SystemExit("Missing required environment variables: " + ", ".join(missing))

          refresh_token = get_oauth2_refresh_token()
          if not refresh_token:
              raise SystemExit(
                  "Missing OAUTH2_REFRESH_TOKEN and no encrypted refresh token file exists"
              )

          refresh_oauth2_access_token(
              os.environ["OAUTH2_CLIENT_ID"],
              os.environ["OAUTH2_CLIENT_SECRET"],
              refresh_token,
          )
          PY
        env:
          OAUTH2_CLIENT_ID: ${{ secrets.OAUTH2_CLIENT_ID }}
          OAUTH2_CLIENT_SECRET: ${{ secrets.OAUTH2_CLIENT_SECRET }}
          OAUTH2_REFRESH_TOKEN: ${{ secrets.OAUTH2_REFRESH_TOKEN }}
          OAUTH2_REFRESH_TOKEN_KEY: ${{ secrets.OAUTH2_REFRESH_TOKEN_KEY }}

      - name: Commit rotated OAuth2 refresh token
        run: |
          if [ -z "$(git status --porcelain -- .oauth2_refresh_token.enc)" ]; then
            echo "No rotated OAuth2 refresh token changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .oauth2_refresh_token.enc
          git commit -m "Update OAuth2 refresh token"
          git push
