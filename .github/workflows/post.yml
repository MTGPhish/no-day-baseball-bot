name: Post Meme If No Day Baseball

on:
  schedule:
    - cron: "23,53 12-14 * * *"  # early staggered attempts: 7:23-9:53 AM Central during daylight time
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: post-meme-if-no-day-baseball
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest bot state
        run: git pull --ff-only origin main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install tweepy python-dotenv requests cryptography

      - run: python -m unittest discover -s tests -v

      - name: Post scheduled tweet
        id: post
        run: python tweet_bot.py
        env:
          X_AUTH_MODE:        oauth2
          API_KEY:            ${{ secrets.API_KEY }}
          API_SECRET:         ${{ secrets.API_SECRET }}
          ACCESS_TOKEN:       ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          OAUTH2_CLIENT_ID:   ${{ secrets.OAUTH2_CLIENT_ID }}
          OAUTH2_CLIENT_SECRET: ${{ secrets.OAUTH2_CLIENT_SECRET }}
          OAUTH2_REFRESH_TOKEN: ${{ secrets.OAUTH2_REFRESH_TOKEN }}
          OAUTH2_REFRESH_TOKEN_KEY: ${{ secrets.OAUTH2_REFRESH_TOKEN_KEY }}

      - name: Commit rotated OAuth2 refresh token
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- .oauth2_refresh_token.enc .posted_actions.json)" ]; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .oauth2_refresh_token.enc
          if [ -f .posted_actions.json ]; then
            git add .posted_actions.json
          fi
          git commit -m "Update bot run state"
          git pull --rebase origin main
          git push
