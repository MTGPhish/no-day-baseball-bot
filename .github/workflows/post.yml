name: Post Meme If No Day Baseball

on:
  push:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC, which is 8:00 AM during Eastern Daylight Time
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install tweepy python-dotenv requests

      - run: python -m unittest discover -s tests -v

      - name: Dry run tomorrow's slate on push
        if: github.event_name == 'push'
        shell: bash
        run: |
          export TARGET_DATE="$(TZ=America/New_York date -d tomorrow +%F)"
          export DRY_RUN=1
          python tweet_bot.py

      - name: Post scheduled tweet
        if: github.event_name != 'push'
        run: python tweet_bot.py
        env:
          API_KEY:            ${{ secrets.API_KEY }}
          API_SECRET:         ${{ secrets.API_SECRET }}
          ACCESS_TOKEN:       ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
